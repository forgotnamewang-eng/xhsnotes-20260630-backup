<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小红书热门笔记库（26.6.30 备份）</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>小红书热门笔记库（26.6.30 备份）</h1>
          <p id="summaryText">正在读取数据...</p>
        </div>
        <div class="quick-stats" aria-label="数据概览">
          <div>
            <span id="totalCount">0</span>
            <small>笔记</small>
          </div>
          <div>
            <span id="shownCount">0</span>
            <small>当前显示</small>
          </div>
        </div>
      </header>

      <main class="layout">
        <aside class="filters" aria-label="筛选">
          <label>
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="标题、账号、筛选条件" />
          </label>

          <label>
            <span>行业</span>
            <select id="industrySelect"></select>
          </label>

          <label>
            <span>细分方向</span>
            <select id="subcategorySelect"></select>
          </label>

          <label>
            <span>素材类型</span>
            <select id="materialSelect"></select>
          </label>

          <div class="fixed-sort">
            <span>排序</span>
            <strong>点赞量高到低</strong>
          </div>

          <div class="number-grid">
            <label>
              <span>最低点赞</span>
              <input id="minLikesInput" type="number" min="0" inputmode="numeric" />
            </label>
            <label>
              <span>最低收藏</span>
              <input id="minCollectsInput" type="number" min="0" inputmode="numeric" />
            </label>
          </div>

          <label class="toggle-row">
            <input id="validOnlyInput" type="checkbox" checked />
            <span>仅看有效数据</span>
          </label>

          <button id="resetButton" type="button">重置筛选</button>
        </aside>

        <section class="content">
          <div id="cardsGrid" class="cards-grid" aria-live="polite"></div>
          <div id="emptyState" class="empty-state" hidden>没有匹配的笔记</div>
        </section>
      </main>
    </div>

    <script src="data/notes.js"></script>
    <script src="app.js"></script>
  </body>
</html>
